<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAMEX - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #004a99; }
        .card-header { background-color: #0056b3; color: white; font-weight: bold; }
        .btn-primary { background-color: #0056b3; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <strong>VITAMEX S.A. de C.V.</strong> | Panel de Control
        </a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header">Registrar Movimiento</div>
                <div class="card-body">
                    <form id="formMovimiento">
                        <div class="mb-3">
                            <label class="form-label">Producto (Catálogo)</label>
                            <select id="idProducto" class="form-select" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select id="tipo" class="form-select">
                                <option value="Entrada">Entrada</option>
                                <option value="Salida">Salida</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" id="cantidad" class="form-control" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Departamento Responsable</label>
                            <select id="departamento" class="form-select" required>
                                <option value="">Seleccione área...</option>
                                <option>Investigación y desarrollo</option>
                                <option>Asuntos médicos</option>
                                <option>Asuntos regulatorios</option>
                                <option>Producción y fabricación</option>
                                <option>Marketing y ventas</option>
                                <option>Fármaco regulación</option>
                                <option>Control y aseguramiento de calidad</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Responsable</label>
                            <input type="text" id="responsable" class="form-control" placeholder="Nombre del empleado" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Registro</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    Inventario Actual
                    <button class="btn btn-sm btn-light" onclick="cargarInventario()" id="btnActualizar">🔄 Actualizar</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Stock</th>
                                    <th>Departamento</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                </tbody>
                        </table>
                    </div>
                    <div id="loader" class="text-center d-none">
                        <div class="spinner-border text-primary" role="status spinner-border-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // REEMPLAZA ESTA URL CON LA QUE TE DIO GOOGLE APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbwnjuYm2rQkiyngtW2z94ehMyKweZ5T_h0kEZeYlc3Fnz9LXw75gzFeP9kD9oDH6aG6/exec';

    // Función para cargar el Catálogo de Productos al inicio
    async function cargarCatalogoProductos() {
        const selectProducto = document.getElementById('idProducto');
        selectProducto.innerHTML = '<option value="">Cargando catálogo...</option>';

        try {
            const res = await fetch(API_URL + '?sheet=Catalogo_Productos');
            const data = await res.json();
            
            selectProducto.innerHTML = '<option value="">Seleccione producto...</option>';
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item.ID_Producto;
                option.text = `${item.Nombre_Producto} (${item.ID_Producto})`;
                selectProducto.add(option);
            });
        } catch (error) {
            console.error('Error cargando catálogo:', error);
            selectProducto.innerHTML = '<option value="">Error al cargar catálogo</option>';
        }
    }

    // Función para cargar inventario (arreglada)
    async function cargarInventario() {
        const tabla = document.getElementById('tablaCuerpo');
        const loader = document.getElementById('loader');
        const btnActualizar = document.getElementById('btnActualizar');
        
        tabla.innerHTML = '';
        loader.classList.remove('d-none');
        btnActualizar.disabled = true;

        try {
            const res = await fetch(API_URL + '?sheet=Productos');
            const data = await res.json();
            
            data.forEach(item => {
                const fila = `<tr>
                    <td>${item.ID}</td>
                    <td>${item.Nombre}</td>
                    <td><span class="badge ${item.Stock < 5 ? 'bg-danger' : 'bg-success'}">${item.Stock}</span></td>
                    <td>${item.Departamento}</td>
                </tr>`;
                tabla.innerHTML += fila;
            });
        } catch (error) {
            console.error('Error:', error);
            tabla.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error al conectar con la base de datos. Verifique la URL de Apps Script.</td></tr>';
        } finally {
            loader.classList.add('d-none');
            btnActualizar.disabled = false;
        }
    }

    // Función para enviar movimiento
    document.getElementById('formMovimiento').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const payload = {
            idProducto: document.getElementById('idProducto').value,
            tipo: document.getElementById('tipo').value,
            cantidad: document.getElementById('cantidad').value,
            responsable: document.getElementById('responsable').value,
            departamento: document.getElementById('departamento').value
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            alert('Movimiento registrado con éxito. El stock se actualizará en unos segundos.');
            document.getElementById('formMovimiento').reset();
            setTimeout(cargarInventario, 2000); // Recargar después de 2 seg.
        } catch (error) {
            alert('Hubo un problema al guardar.');
        }
    });

    // Carga inicial al cargar la página
    window.onload = function() {
        cargarCatalogoProductos();
        cargarInventario();
    };
</script>

</body>
</html>
